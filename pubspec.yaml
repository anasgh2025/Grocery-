name: Grovia
description: Grovia is a smart grocery list app that helps you organize your shopping and collaborate with family or friends in real time. Create lists, share them instantly, and never forget an item again.
publish_to: "none"
version: 1.0.0+10
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.0.0
  cupertino_icons: ^1.0.2
  google_fonts: ^8.0.1
  flutter_svg: ^2.0.7
  http: ^1.1.0
  share_plus: ^12.0.1
  image_picker: ^1.1.2
  flutter_secure_storage: ^8.0.0
  flutter_localizations:
    sdk: flutter
  flutter_gen: ^5.13.0
  intl: ^0.20.2
  speech_to_text: ^7.3.0
  flutter_dotenv: ^5.0.2
  app_links: ^3.4.0
  local_auth: ^2.3.0
  # Directly added to allow newer transitive versions where safe
  # characters is pinned by the Flutter SDK; keep it transitive
  # material_color_utilities is pinned by the Flutter SDK; keep it transitive
  # path_provider_foundation requires a newer Dart SDK; left as transitive dependency for now

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - .env
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
        - asset: assets/fonts/Nunito-Italic-VariableFont_wght.ttf
          style: italic

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/appicon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
